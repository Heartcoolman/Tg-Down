name: Release
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  GO_VERSION: '1.25'

jobs:
  # CGo + TDLib 无法交叉编译，故按平台原生构建（仅 linux-amd64 与 darwin-arm64）。
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            name: linux-amd64
          - runner: macos-14
            name: darwin-arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup TDLib
        uses: ./.github/actions/setup-tdlib

      - name: Test
        run: go test ./...

      - name: Build
        run: |
          mkdir -p dist/pkg
          go build -ldflags="-s -w" -o dist/pkg/tg-down ./cmd

      - name: Assemble package
        run: |
          cp config.yaml.example dist/pkg/config.yaml
          cp .env.example dist/pkg/.env.example || true
          cp LICENSE dist/pkg/ || true
          cp README.md dist/pkg/ || true
          cat > dist/pkg/start.sh <<'EOF'
          #!/bin/bash
          cd "$(dirname "$0")"
          [ -f config.yaml ] || { echo "请先编辑 config.yaml 填入 API 信息"; exit 1; }
          mkdir -p downloads sessions
          chmod +x tg-down
          ./tg-down "$@"
          EOF
          chmod +x dist/pkg/start.sh dist/pkg/tg-down
          tar -czf "tg-down-${{ matrix.name }}.tar.gz" -C dist/pkg .

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: tg-down-${{ matrix.name }}
          path: tg-down-${{ matrix.name }}.tar.gz

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Checksums
        run: |
          cd artifacts
          sha256sum tg-down-*.tar.gz > checksums.txt
          cat checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/tg-down-*.tar.gz
            artifacts/checksums.txt
          generate_release_notes: true
          draft: false
          prerelease: false
          body: |
            ## 📦 发布包（基于官方 TDLib 引擎）

            本版本下载引擎已切换为官方 TDLib，提供原生构建的二进制：

            - **Linux x86_64**: `tg-down-linux-amd64.tar.gz`
            - **macOS Apple Silicon**: `tg-down-darwin-arm64.tar.gz`

            > CGo 依赖 libtdjson 已静态链入；运行仍需系统 OpenSSL（Linux: libssl3；macOS: `brew install openssl@3`）。
            > Windows 及交叉编译目标因 CGo 暂不提供，可在对应平台自行 `make tdlib && make build` 构建。

            ### 🚀 使用
            1. 解压，编辑 `config.yaml` 填入 Telegram API 信息（https://my.telegram.org/apps）
            2. 运行 `./start.sh`（或 `./tg-down`；`./tg-down --web` 启动网页管理端）

  dependency-submission:
    runs-on: ubuntu-latest
    name: Submit Dependencies for Release
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Setup TDLib
        uses: ./.github/actions/setup-tdlib

      - name: Run Go Dependency Submission
        uses: actions/go-dependency-submission@v2
        with:
          go-mod-path: go.mod
          go-build-target: ./cmd
