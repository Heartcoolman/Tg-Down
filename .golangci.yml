version: "2"
run:
  issues-exit-code: 1
  tests: true
output:
  formats:
    text:
      path: stdout
      print-linter-name: true
      print-issued-lines: true
linters:
  enable:
    - bodyclose
    - depguard
    - dogsled
    - dupl
    - exhaustive
    - gochecknoinits
    - goconst
    - gocritic
    - gocyclo
    - goprintffuncname
    - gosec
    - lll
    - misspell
    - mnd
    - nakedret
    - noctx
    - nolintlint
    - revive
    - rowserrcheck
    - staticcheck
    - unconvert
    - unparam
    - whitespace
  settings:
    depguard:
      rules:
        main:
          files:
            - '!**/*_test.go'
          allow:
            - $gostd
            - github.com/zelenin/go-tdlib/client
            - github.com/joho/godotenv
            - gopkg.in/yaml.v3
            - modernc.org/sqlite
            - tg-down/internal/config
            - tg-down/internal/logger
            - tg-down/internal/telegram
            - tg-down/internal/downloader
            - tg-down/internal/web
            - tg-down/internal/retry
            - tg-down/internal/store
            - tg-down/internal/queue
    dupl:
      threshold: 100
    goconst:
      min-len: 2
      min-occurrences: 2
    gocritic:
      disabled-checks:
        - dupImport
        - ifElseChain
        - octalLiteral
        - whyNoLint
        - wrapperFunc
        - exitAfterDefer
        - importShadow
      enabled-tags:
        - diagnostic
        - experimental
        - opinionated
        - performance
        - style
    gocyclo:
      min-complexity: 15
    lll:
      line-length: 140
    misspell:
      locale: US
    mnd:
      checks:
        - argument
        - case
        - condition
        - return
      ignored-numbers:
        - "0"
        - "1"
        - "2"
        - "3"
        - "10"
        - "100"
        - "1000"
        - "1024"
      ignored-functions:
        - time.Sleep
        - time.Duration
        - make
        - strconv.FormatInt
        - strconv.ParseInt
  exclusions:
    generated: lax
    rules:
      - linters:
          - dupl
          - goconst
          - mnd
        path: _test\.go
      - linters:
          - gochecknoinits
        path: cmd/
      - linters:
          - unparam
        text: parameter .* seems to be unused
    paths:
      - .*\.pb\.go$
      - .*_test.go
      - vendor
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - tg-down
  exclusions:
    generated: lax
    paths:
      - .*\.pb\.go$
      - .*_test.go
      - vendor
      - third_party$
      - builtin$
      - examples$
